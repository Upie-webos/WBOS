<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Luoan OS G1.0 | 完整桌面操作系统</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --surface: rgba(20,20,25,0.96);
            --surface-light: rgba(35,35,45,0.96);
            --text: #fff;
            --text-dim: rgba(255,255,255,0.6);
            --accent: #0078d4;
            --accent-hover: #1084e0;
            --danger: #e81123;
            --warning: #ffbd2e;
            --success: #107c10;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        body.light {
            --bg: #f0f0f0;
            --surface: rgba(245,245,250,0.96);
            --surface-light: rgba(235,235,240,0.96);
            --text: #1a1a2e;
            --text-dim: rgba(0,0,0,0.6);
            --border: rgba(0,0,0,0.1);
        }
        body { font-family: 'Segoe UI', system-ui; overflow: hidden; height: 100vh; background: var(--bg); color: var(--text); transition: 0.2s; }
        .wallpaper-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; }
        .desktop { position: relative; width: 100%; height: 100%; z-index: 1; background: rgba(0,0,0,0.15); overflow: auto; }
        .desktop-icons { position: absolute; top: 20px; left: 20px; display: grid; grid-template-columns: repeat(4, 100px); gap: 16px; }
        .desktop-icon { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 8px; border-radius: 12px; cursor: pointer; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); transition: 0.1s; }
        .desktop-icon:hover { background: rgba(255,255,255,0.2); transform: scale(1.02); }
        .desktop-icon .icon { font-size: 32px; }
        .desktop-icon .label { font-size: 11px; text-align: center; }
        .taskbar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); height: 56px; background: var(--surface); backdrop-filter: blur(24px); border-radius: 32px; border: 1px solid var(--border); display: flex; align-items: center; gap: 4px; padding: 0 12px; z-index: 1000; box-shadow: var(--shadow); }
        .taskbar-app { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; font-size: 22px; transition: 0.1s; position: relative; }
        .taskbar-app:hover { background: var(--border); transform: scale(1.08); }
        .taskbar-app.active::after { content: ''; position: absolute; bottom: 4px; left: 12px; right: 12px; height: 3px; background: var(--accent); border-radius: 3px; }
        .clock-area { position: fixed; bottom: 20px; right: 20px; background: var(--surface); backdrop-filter: blur(24px); padding: 8px 16px; border-radius: 32px; font-size: 13px; z-index: 1000; border: 1px solid var(--border); display: flex; gap: 12px; }
        .start-menu { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 540px; background: var(--surface); backdrop-filter: blur(32px); border-radius: 24px; border: 1px solid var(--border); z-index: 1100; display: none; overflow: hidden; max-height: 70vh; overflow-y: auto; }
        .start-menu.show { display: block; animation: slideUp 0.2s; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .start-header { padding: 20px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
        .start-avatar { width: 56px; height: 56px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .start-user h4 { font-size: 18px; }
        .start-user p { font-size: 12px; opacity: 0.6; }
        .start-pins { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .start-pins-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 12px; }
        .start-pin { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; border-radius: 16px; cursor: pointer; }
        .start-pin:hover { background: var(--border); }
        .pin-icon { font-size: 24px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--surface-light); border-radius: 14px; }
        .pin-name { font-size: 10px; }
        .window { position: absolute; background: var(--surface); backdrop-filter: blur(24px); border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; min-width: 450px; min-height: 350px; z-index: 100; resize: both; }
        .window.active { border-color: var(--accent); z-index: 300; }
        .window-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); cursor: move; border-bottom: 1px solid var(--border); }
        .win-btns { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: 0.1s; }
        .win-btn.close { background: #ff5f56; }
        .win-btn.close:hover { background: #ff7b72; transform: scale(1.2); }
        .win-btn.min { background: #ffbd2e; }
        .win-btn.min:hover { background: #ffdd6b; transform: scale(1.2); }
        .win-btn.max { background: #27c93f; }
        .win-btn.max:hover { background: #5bff6b; transform: scale(1.2); }
        .window-title { flex: 1; text-align: center; font-size: 13px; }
        .window-content { flex: 1; overflow: auto; padding: 16px; }
        .file-toolbar, .app-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        button, .app-btn { padding: 8px 16px; background: var(--surface-light); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; }
        button:hover { background: var(--accent); }
        .file-list, .app-list { display: flex; flex-direction: column; gap: 4px; max-height: 400px; overflow-y: auto; }
        .file-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .file-item:hover { background: var(--border); }
        .file-item.selected { background: var(--accent); }
        .timer-display { font-size: 64px; font-family: monospace; text-align: center; margin: 20px 0; }
        .recycle-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid var(--border); }
        .terminal { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; height: 100%; display: flex; flex-direction: column; }
        .terminal-output { flex: 1; overflow-y: auto; padding: 12px; white-space: pre-wrap; font-size: 12px; }
        .terminal-input-line { display: flex; padding: 8px 12px; border-top: 1px solid #333; }
        .terminal-input { flex: 1; background: transparent; border: none; color: #00ff00; font-family: monospace; outline: none; }
        .notification-area { position: fixed; bottom: 80px; right: 20px; z-index: 1200; }
        .notify { background: var(--surface); backdrop-filter: blur(12px); padding: 10px 18px; border-radius: 32px; margin-top: 8px; border: 1px solid var(--border); font-size: 13px; }
        .copyright { position: fixed; bottom: 8px; left: 16px; font-size: 9px; opacity: 0.3; z-index: 999; }
        .context-menu { position: fixed; background: var(--surface); backdrop-filter: blur(20px); border-radius: 12px; border: 1px solid var(--border); padding: 8px 0; min-width: 180px; z-index: 2000; }
        .context-menu-item { padding: 8px 20px; cursor: pointer; }
        .context-menu-item:hover { background: var(--border); }
        .mount-overlay, .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .mount-card, .login-card { background: var(--surface); border-radius: 32px; padding: 40px; width: 400px; text-align: center; border: 1px solid var(--border); }
        .login-card input { width: 100%; padding: 12px; margin: 16px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; }
        .system-monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .monitor-card { background: var(--surface-light); border-radius: 12px; padding: 16px; text-align: center; }
        .monitor-value { font-size: 32px; font-weight: bold; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        .calculator { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 300px; margin: 0 auto; }
        .calc-btn { padding: 16px; font-size: 18px; text-align: center; background: var(--surface-light); border-radius: 12px; cursor: pointer; }
        .calc-btn:hover { background: var(--accent); }
        .calc-display { background: var(--border); padding: 16px; border-radius: 12px; margin-bottom: 16px; text-align: right; font-size: 24px; font-family: monospace; }
        .note-item { background: var(--surface-light); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .alarm-item { background: var(--surface-light); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .p2p-area { text-align: center; }
        .p2p-qrcode { display: flex; justify-content: center; margin: 16px 0; }
        .hidden { display: none; }
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .setting-item { margin-bottom: 20px; }
        .setting-item label { display: block; margin-bottom: 8px; font-size: 13px; opacity: 0.7; }
        .setting-item input, .setting-item select { width: 100%; padding: 10px; background: var(--surface-light); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
    </style>
</head>
<body>

<div class="wallpaper-layer" id="wallpaperLayer"></div>
<div class="desktop" id="desktopArea">
    <div class="desktop-icons" id="desktopIcons"></div>
</div>

<div class="taskbar" id="taskbar">
    <div class="taskbar-app" data-app="start" id="startBtn">🍔</div>
    <div class="taskbar-app" data-app="thispc">🖥️</div>
    <div class="taskbar-app" data-app="filemanager">📁</div>
    <div class="taskbar-app" data-app="recycle">🗑️</div>
    <div class="taskbar-app" data-app="settings">⚙️</div>
    <div class="taskbar-app" data-app="tomato">🍅</div>
    <div class="taskbar-app" data-app="browser">🌐</div>
    <div class="taskbar-app" data-app="terminal">💻</div>
    <div class="taskbar-app" data-app="monitor">📊</div>
    <div class="taskbar-app" data-app="calculator">🧮</div>
    <div class="taskbar-app" data-app="notes">📝</div>
    <div class="taskbar-app" data-app="alarm">⏰</div>
    <div class="taskbar-app" data-app="p2p">📡</div>
    <div class="taskbar-app" data-app="paint">🎨</div>
    <div class="taskbar-app" data-app="music">🎵</div>
</div>

<div class="clock-area">
    <span id="clockDisplay">--:--</span>
    <span id="dateDisplay">--/--/--</span>
</div>

<div id="startMenu" class="start-menu">
    <div class="start-header">
        <div class="start-avatar" id="startAvatar">👤</div>
        <div class="start-user">
            <h4 id="startUsername">用户</h4>
            <p id="startUserStatus">已登录</p>
        </div>
    </div>
    <div class="start-pins">
        <div class="start-pins-grid" id="startPinsGrid"></div>
    </div>
    <div class="start-pins">
        <div class="start-pins-grid">
            <div class="start-pin" id="lockBtn"><div class="pin-icon">🔒</div><div class="pin-name">锁定</div></div>
            <div class="start-pin" id="shutdownBtn"><div class="pin-icon">🔌</div><div class="pin-name">关机</div></div>
            <div class="start-pin" id="restartBtn"><div class="pin-icon">🔄</div><div class="pin-name">重启</div></div>
            <div class="start-pin" id="sleepBtn"><div class="pin-icon">💤</div><div class="pin-name">睡眠</div></div>
        </div>
    </div>
</div>

<div class="notification-area" id="notifyArea"></div>
<div class="copyright">© Chen YiHang | Luoan OS G1.0 | 完整桌面系统 | 为删库服务</div>

<script>
// ==================== 完整操作系统核心 ====================
(function(){
    // ----- 全局状态 -----
    let usbRoot = null, webosDir = null;
    let userConfig = { name: '用户', password: '', theme: 'dark', wallpaper: null, apps: [] };
    let isLoggedIn = true;
    let windows = [], activeWindowId = null, nextZIndex = 300;
    
    // 文件系统
    let fileSystem = {
        'root': { type: 'dir', parent: null, children: ['Documents', 'Pictures', 'Downloads', 'Music', 'Videos', '回收站'] },
        'Documents': { type: 'dir', parent: 'root', children: [] },
        'Pictures': { type: 'dir', parent: 'root', children: [] },
        'Downloads': { type: 'dir', parent: 'root', children: [] },
        'Music': { type: 'dir', parent: 'root', children: [] },
        'Videos': { type: 'dir', parent: 'root', children: [] },
        '回收站': { type: 'dir', parent: 'root', children: [] }
    };
    let currentPath = 'root';
    let selectedFile = null;
    let currentFmWindow = null;
    let recycleBin = [];
    
    // 番茄钟
    let tomatoSeconds = 25*60, tomatoInterval = null, tomatoRunning = false, tomatoSessions = 0;
    let tomatoTasks = JSON.parse(localStorage.getItem('tomato_tasks') || '[]');
    
    // 便签
    let notes = JSON.parse(localStorage.getItem('notes') || '[]');
    
    // 闹钟
    let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
    let alarmInterval = null;
    
    // 终端权限
    let terminalContext = { hasAdmin: false, hasRoot: false, lockedUntil: null };
    let terminalHistory = [];
    let termHistoryIndex = -1;
    
    // 画板
    let painting = false;
    
    // 音乐播放器
    let currentTrack = null;
    
    // 所有应用列表
    const allApps = [
        { id: 'thispc', name: '此电脑', icon: '🖥️', desc: '查看系统信息' },
        { id: 'filemanager', name: '文件管理器', icon: '📁', desc: '管理文件和文件夹' },
        { id: 'recycle', name: '回收站', icon: '🗑️', desc: '恢复已删除的文件' },
        { id: 'settings', name: '设置', icon: '⚙️', desc: '系统设置' },
        { id: 'tomato', name: '番茄钟', icon: '🍅', desc: '专注计时器' },
        { id: 'browser', name: 'itaka浏览器', icon: '🌐', desc: '网页浏览' },
        { id: 'terminal', name: '命令行', icon: '💻', desc: 'Linux风格终端' },
        { id: 'monitor', name: '系统监视器', icon: '📊', desc: 'CPU/内存监控' },
        { id: 'calculator', name: '计算器', icon: '🧮', desc: '科学计算器' },
        { id: 'notes', name: '便签本', icon: '📝', desc: '快速记录' },
        { id: 'alarm', name: '闹钟', icon: '⏰', desc: '定时提醒' },
        { id: 'p2p', name: '网络传输', icon: '📡', desc: 'P2P文件传输' },
        { id: 'paint', name: '画图', icon: '🎨', desc: '简单绘图' },
        { id: 'music', name: '音乐播放器', icon: '🎵', desc: '本地音乐播放' }
    ];
    
    // ----- 辅助函数 -----
    function showNotify(msg, time=2500) {
        const area = document.getElementById('notifyArea');
        const n = document.createElement('div');
        n.className = 'notify';
        n.innerText = msg;
        area.appendChild(n);
        setTimeout(() => n.remove(), time);
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function applyTheme(theme) {
        document.body.classList.toggle('light', theme === 'light');
        userConfig.theme = theme;
        saveConfig();
    }
    
    // ----- U盘存储 -----
    async function ensureWebOS() { try { webosDir = await usbRoot.getDirectoryHandle('.webos', { create: true }); return true; } catch(e) { return false; } }
    async function saveConfig() { if(!webosDir) return; try { const f = await webosDir.getFileHandle('config.json', { create: true }); const w = await f.createWritable(); await w.write(JSON.stringify(userConfig)); await w.close(); } catch(e){} }
    async function loadConfig() { if(!webosDir) return; try { const f = await webosDir.getFileHandle('config.json'); const file = await f.getFile(); return JSON.parse(await file.text()); } catch(e){ return null; } }
    async function saveFS() { if(!webosDir) return; try { const f = await webosDir.getFileHandle('filesystem.json', { create: true }); const w = await f.createWritable(); await w.write(JSON.stringify({ files: fileSystem, recycle: recycleBin })); await w.close(); } catch(e){} }
    async function loadFS() { if(!webosDir) return; try { const f = await webosDir.getFileHandle('filesystem.json'); const file = await f.getFile(); const data = JSON.parse(await file.text()); fileSystem = data.files || fileSystem; recycleBin = data.recycle || []; } catch(e){} }
    async function saveWallpaper(blob) { if(!webosDir) return; try { const f = await webosDir.getFileHandle('wallpaper.jpg', { create: true }); const w = await f.createWritable(); await w.write(blob); await w.close(); const url = URL.createObjectURL(blob); document.getElementById('wallpaperLayer').style.backgroundImage = `url(${url})`; showNotify('壁纸已更新'); } catch(e){} }
    
    // ----- 文件操作 -----
    function getChildren(path) { return fileSystem[path]?.children || []; }
    function addItem(parent, name, isDir, content='') {
        if(!fileSystem[parent]) return false;
        if(fileSystem[parent].children.includes(name)) return false;
        fileSystem[parent].children.push(name);
        fileSystem[name] = { type: isDir ? 'dir' : 'file', parent, content };
        saveFS();
        return true;
    }
    function deleteToRecycle(name) {
        const node = fileSystem[name];
        if(!node) return false;
        const parent = node.parent;
        if(parent && fileSystem[parent]?.children) {
            const idx = fileSystem[parent].children.indexOf(name);
            if(idx !== -1) fileSystem[parent].children.splice(idx,1);
        }
        recycleBin.push({ name, originalPath: parent, content: node.content, type: node.type, deletedAt: new Date().toLocaleString() });
        delete fileSystem[name];
        saveFS();
        return true;
    }
    function restoreFromRecycle(itemName) {
        const item = recycleBin.find(r => r.name === itemName);
        if(!item) return;
        if(addItem(item.originalPath, item.name, item.type === 'dir', item.content)) {
            recycleBin = recycleBin.filter(r => r.name !== itemName);
            saveFS();
            showNotify(`已恢复: ${itemName}`);
        }
    }
    
    // ----- 窗口管理 -----
    function closeWindow(winId) {
        const idx = windows.findIndex(w => w.id === winId);
        if(idx === -1) return;
        windows[idx].element.remove();
        windows.splice(idx,1);
        if(activeWindowId === winId) activeWindowId = windows.length ? windows[windows.length-1]?.id : null;
        if(activeWindowId) setActive(activeWindowId);
        updateTaskbarActive();
        if(winId === currentFmWindow) currentFmWindow = null;
    }
    function setActive(winId) {
        const win = windows.find(w => w.id === winId);
        if(!win) return;
        nextZIndex++;
        win.element.style.zIndex = nextZIndex;
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        win.element.classList.add('active');
        activeWindowId = winId;
        updateTaskbarActive();
    }
    function updateTaskbarActive() {
        document.querySelectorAll('.taskbar-app[data-app]').forEach(app => {
            const appType = app.getAttribute('data-app');
            if(appType === 'start') return;
            const isOpen = windows.some(w => w.appType === appType);
            if(isOpen) app.classList.add('active');
            else app.classList.remove('active');
        });
    }
    function makeDraggable(header, winDiv, winId) {
        let drag=false, offX, offY;
        header.addEventListener('mousedown', (e) => {
            if(e.target.classList?.contains('win-btn')) return;
            drag=true; offX=e.clientX-winDiv.offsetLeft; offY=e.clientY-winDiv.offsetTop;
            winDiv.style.cursor='grabbing'; setActive(winId); e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if(!drag) return;
            winDiv.style.left = Math.min(Math.max(e.clientX-offX, -50), window.innerWidth-winDiv.offsetWidth+50) + 'px';
            winDiv.style.top = Math.min(Math.max(e.clientY-offY, 0), window.innerHeight-winDiv.offsetHeight-40) + 'px';
        });
        window.addEventListener('mouseup', () => { drag=false; winDiv.style.cursor=''; });
    }
    
    function createWindow(title, appType, contentHtml, w=700, h=500, left=100, top=80) {
        const id = `${appType}_${Date.now()}`;
        const div = document.createElement('div');
        div.id = id; div.className = 'window';
        div.style.width = w+'px'; div.style.height = h+'px';
        div.style.left = left+'px'; div.style.top = top+'px';
        div.innerHTML = `
            <div class="window-header">
                <div class="win-btns">
                    <div class="win-btn close"></div>
                    <div class="win-btn min"></div>
                    <div class="win-btn max"></div>
                </div>
                <div class="window-title">${title}</div>
                <div style="width:60px"></div>
            </div>
            <div class="window-content">${contentHtml}</div>
        `;
        document.getElementById('desktopArea').appendChild(div);
        windows.push({ id, element: div, title, appType });
        setActive(id);
        updateTaskbarActive();
        const closeBtn = div.querySelector('.win-btn.close');
        const minBtn = div.querySelector('.win-btn.min');
        const maxBtn = div.querySelector('.win-btn.max');
        closeBtn.onclick = () => closeWindow(id);
        minBtn.onclick = () => { div.style.display = 'none'; };
        maxBtn.onclick = () => {
            if(div.style.width === '100%') {
                div.style.width = w+'px'; div.style.height = h+'px';
                div.style.left = left+'px'; div.style.top = top+'px';
            } else {
                div.style.width = 'calc(100% - 40px)'; div.style.height = 'calc(100% - 80px)';

    // ----- 刷新文件管理器 -----
    function refreshFileManager() {
        if(!currentFmWindow) return;
        const div = document.getElementById(currentFmWindow);
        if(!div) return;
        const listDiv = div.querySelector('#fmList');
        const addr = div.querySelector('#fmAddr');
        if(!listDiv) return;
        addr.innerText = currentPath === 'root' ? '/' : currentPath;
        const children = getChildren(currentPath);
        listDiv.innerHTML = '';
        if(currentPath !== 'root') {
            const up = document.createElement('div'); up.className = 'file-item';
            up.innerHTML = `<div class="file-icon">📂</div><div class="file-name">..</div>`;
            up.onclick = () => { currentPath = fileSystem[currentPath]?.parent || 'root'; refreshFileManager(); };
            listDiv.appendChild(up);
        }
        for(const child of children) {
            const node = fileSystem[child];
            const isDir = node?.type === 'dir';
            const item = document.createElement('div'); item.className = 'file-item';
            if(selectedFile === child) item.classList.add('selected');
            item.innerHTML = `<div class="file-icon">${isDir ? '📁' : '📄'}</div><div class="file-name">${escapeHtml(child)}</div>`;
            item.onclick = (e) => { e.stopPropagation(); selectedFile = child; refreshFileManager(); };
            if(isDir) item.ondblclick = () => { currentPath = child; refreshFileManager(); };
            else item.ondblclick = () => { if(node?.content) window.open(URL.createObjectURL(new Blob([node.content], {type:'text/plain'}))); };
            listDiv.appendChild(item);
        }
    }

                    try {

                    calcExpr += val;
                    display.innerText = calcExpr;
                }
            };
        });

        const receivedDiv = div.querySelector('#p2pReceived');
        
        div.querySelector('#createHostP2P').onclick = () => {
            p2pPeer = new SimplePeer({ initiator: true, trickle: false });
            p2pPeer.on('signal', data => {
                const connStr = JSON.stringify(data);
                QRCode.toCanvas(document.createElement('canvas'), connStr, { width: 180 }, (err, canvas) => {
                    qrDiv.innerHTML = '';
                    qrDiv.appendChild(canvas);
                    qrDiv.innerHTML += `<textarea rows="2" style="width:100%;margin-top:8px;font-size:10px;background:rgba(0,0,0,0.3);border-radius:8px;border:none;padding:4px" readonly>${connStr}</textarea>`;
                });
                statusDiv.innerHTML = '⏳ 等待对方连接...';
            });
            p2pPeer.on('connect', () => {
                statusDiv.innerHTML = '✅ 已连接！可以发送文件';
                sendArea.style.display = 'block';
                qrDiv.innerHTML = '';
            });
            p2pPeer.on('data', data => {
                const blob = new Blob([data], {type: 'application/octet-stream'});
                const url = URL.createObjectURL(blob);
                receivedDiv.innerHTML += `<div style="margin-top:8px;padding:8px;background:rgba(0,0,0,0.2);border-radius:8px">📥 收到文件 <a href="${url}" download="received_file">下载</a></div>`;
                showNotify('收到文件！');
            });
        };
        div.querySelector('#joinP2P').onclick = () => {
            const signal = prompt('请输入对方的连接信息:');
            if(signal) {
                p2pPeer = new SimplePeer({ initiator: false, trickle: false });
                p2pPeer.signal(JSON.parse(signal));
                p2pPeer.on('connect', () => {
                    statusDiv.innerHTML = '✅ 已连接！可以发送文件';
                    sendArea.style.display = 'block';
                });
                p2pPeer.on('data', data => {
                    const blob = new Blob([data], {type: 'application/octet-stream'});
                    const url = URL.createObjectURL(blob);
                    receivedDiv.innerHTML += `<div><a href="${url}" download="received_file">📥 下载文件</a></div>`;
                });
            }
        };
        div.querySelector('#p2pSendBtn').onclick = () => {
            const file = div.querySelector('#p2pFileInput').files[0];
            if(file && p2pPeer) {
                const reader = new FileReader();
                reader.onload = e => { p2pPeer.send(e.target.result); showNotify('发送中...'); };
                reader.readAsArrayBuffer(file);
            }
        };
    }
    
    // 画图板
    function openPaint() {
        if(windows.some(w=>w.appType==='paint')) { setActive(windows.find(w=>w.appType==='paint').id); return; }
        const {div} = createWindow('🎨 画图', 'paint', `
            <div class="file-toolbar">
                <label>✏️ 颜色: <input type="color" id="paintColor" value="#0078d4"></label>
                <label>📏 大小: <input type="range" id="paintSize" min="1" max="20" value="3"></label>
                <button id="clearCanvas">🗑️ 清空</button>
                <button id="saveCanvas">💾 保存到U盘</button>
            </div>
            <canvas id="paintCanvas" width="600" height="400" style="width:100%;height:auto;border:1px solid var(--border);border-radius:12px;background:white;cursor:crosshair"></canvas>
        `, 700, 550, 150, 80);
        const canvas = div.querySelector('#paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = div.querySelector('#paintColor');
        const sizePicker = div.querySelector('#paintSize');
        
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let painting = false;
        let lastX = 0, lastY = 0;
        
        function draw(e) {
            if(!painting) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            ctx.beginPath();
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = sizePicker.value;
            ctx.lineCap = 'round';
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            [lastX, lastY] = [x, y];
        }
        
        canvas.addEventListener('mousedown', (e) => {
            painting = true;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            lastX = (e.clientX - rect.left) * scaleX;
            lastY = (e.clientY - rect.top) * scaleY;
            ctx.beginPath();
            ctx.fillStyle = colorPicker.value;
            ctx.arc(lastX, lastY, sizePicker.value/2, 0, Math.PI*2);
            ctx.fill();
        });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => painting = false);
        canvas.addEventListener('mouseleave', () => painting = false);
        
        div.querySelector('#clearCanvas').onclick = () => {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        };
        div.querySelector('#saveCanvas').onclick = () => {
            canvas.toBlob(blob => {
                const fileName = `paint_${Date.now()}.png`;
                if(addItem(currentPath, fileName, false, '')) {
                    const reader = new FileReader();
                    reader.onload = e => { fileSystem[fileName].content = e.target.result; saveFS(); showNotify(`已保存: ${fileName}`); };
                    reader.readAsDataURL(blob);
                }
            });
        };
    }
    
    // 音乐播放器
    function openMusic() {
        if(windows.some(w=>w.appType==='music')) { setActive(windows.find(w=>w.appType==='music').id); return; }
        let audio = null;
        let playlist = [];
        
        const {div} = createWindow('🎵 音乐播放器', 'music', `
            <div style="text-align:center">
                <div style="font-size:48px;margin:20px">🎵</div>
                <div id="nowPlaying" style="margin:12px;font-size:16px;font-weight:bold">未播放</div>
                <audio id="audioPlayer" controls style="width:100%;margin:12px 0"></audio>
                <div class="file-toolbar" style="justify-content:center">
                    <button id="uploadMusic">📤 上传音乐</button>
                    <button id="playPlaylist">▶ 播放列表</button>
                </div>
                <div id="playlistArea" style="margin-top:16px;max-height:200px;overflow-y:auto"></div>
            </div>
        `, 500, 500, 180, 100);
        
        const audioElem = div.querySelector('#audioPlayer');
        const nowPlaying = div.querySelector('#nowPlaying');
        const playlistArea = div.querySelector('#playlistArea');
        
        function refreshPlaylist() {
            playlistArea.innerHTML = '';
            const musicFiles = Object.keys(fileSystem).filter(k => fileSystem[k]?.type === 'file' && (k.endsWith('.mp3') || k.endsWith('.wav') || k.endsWith('.ogg')));
            musicFiles.forEach(file => {
                const item = document.createElement('div');
                item.style.padding = '8px';
                item.style.cursor = 'pointer';
                item.style.borderRadius = '8px';
                item.innerHTML = `🎵 ${escapeHtml(file)}`;
                item.onclick = () => {
                    if(fileSystem[file]?.content) {
                        const blob = new Blob([fileSystem[file].content], {type: 'audio/mpeg'});
                        const url = URL.createObjectURL(blob);
                        audioElem.src = url;
                        audioElem.play();
                        nowPlaying.innerText = `正在播放: ${file}`;
                    }
                };
                playlistArea.appendChild(item);
            });
            if(musicFiles.length === 0) playlistArea.innerHTML = '<div style="opacity:0.5;text-align:center">暂无音乐文件，请先上传</div>';
        }
        
        div.querySelector('#uploadMusic').onclick = () => {
            let inp = document.createElement('input'); inp.type='file'; inp.accept='audio/*';
            inp.onchange = e => {
                let f = e.target.files[0];
                if(f) {
                    let r = new FileReader();
                    r.onload = ev => {
                        if(addItem(currentPath, f.name, false, ev.target.result)) {
                            refreshPlaylist();
                            showNotify(`已上传: ${f.name}`);
                        }
                    };
                    r.readAsDataURL(f);
                }
            };
            inp.click();
        };
        div.querySelector('#playPlaylist').onclick = refreshPlaylist;
        refreshPlaylist();
    }
    
    // 命令行终端（真实）
    function openTerminal() {
        if(windows.some(w=>w.appType==='terminal')) { setActive(windows.find(w=>w.appType==='terminal').id); return; }
        
        function executeCommand(cmd, outputDiv) {
            const cmdTrim = cmd.trim();
            if(cmdTrim === '') return;
            
            if(terminalContext.lockedUntil && new Date() < terminalContext.lockedUntil) {
                outputDiv.innerHTML += `<div>⛔ 账户已锁定至 ${terminalContext.lockedUntil.toLocaleTimeString()}</div>`;
                return;
            }
            
            if(cmdTrim === 'help') {
                outputDiv.innerHTML += `<div>可用命令: help, clear, whoami, date, echo, ls, pwd, cd, mkdir, touch, rm, cat, sudo, wb-rot, wbos-rot-su/p, wbos-clean-su/p, @kill-kill, V/io, reset-rm -rf, reset-pn/0, wbos-rot/rm -rf</div>`;
            }
            else if(cmdTrim === 'clear') { outputDiv.innerHTML = ''; return; }
            else if(cmdTrim === 'whoami') { outputDiv.innerHTML += `<div>${userConfig.name}${terminalContext.hasRoot ? ' (root)' : terminalContext.hasAdmin ? ' (admin)' : ''}</div>`; }
            else if(cmdTrim === 'date') { outputDiv.innerHTML += `<div>${new Date().toString()}</div>`; }
            else if(cmdTrim.startsWith('echo ')) { outputDiv.innerHTML += `<div>${cmdTrim.slice(5)}</div>`; }
            else if(cmdTrim === 'ls') { const children = getChildren(currentPath); outputDiv.innerHTML += `<div>${children.join('  ') || '(空目录)'}</div>`; }
            else if(cmdTrim === 'pwd') { outputDiv.innerHTML += `<div>/${currentPath === 'root' ? '' : currentPath}</div>`; }
            else if(cmdTrim.startsWith('cd ')) {
                const target = cmdTrim.slice(3);
                if(target === '..') { if(currentPath !== 'root') currentPath = fileSystem[currentPath]?.parent || 'root'; }
                else if(fileSystem[target]?.type === 'dir') currentPath = target;
                else outputDiv.innerHTML += `<div>目录不存在: ${target}</div>`;
            }
            else if(cmdTrim.startsWith('mkdir ')) { const name = cmdTrim.slice(6); if(name && addItem(currentPath, name, true)) outputDiv.innerHTML += `<div>已创建: ${name}</div>`; }
            else if(cmdTrim.startsWith('touch ')) { const name = cmdTrim.slice(6); if(name && addItem(currentPath, name, false, '')) outputDiv.innerHTML += `<div>已创建: ${name}</div>`; }
            else if(cmdTrim.startsWith('rm ')) { const name = cmdTrim.slice(3); if(fileSystem[name]) { deleteToRecycle(name); outputDiv.innerHTML += `<div>已删除: ${name}</div>`; } }
            else if(cmdTrim.startsWith('cat ')) { const name = cmdTrim.slice(4); if(fileSystem[name]?.type === 'file') outputDiv.innerHTML += `<div>${fileSystem[name].content || '(空文件)'}</div>`; }
            else if(cmdTrim === 'sudo') { outputDiv.innerHTML += `<div>用法: sudo 命令</div>`; }
            else if(cmdTrim.startsWith('sudo ')) {
                const pass = prompt('请输入密码:');
                if(pass === userConfig.password || pass === 'admin123') {
                    terminalContext.hasAdmin = true;
                    executeCommand(cmdTrim.slice(5), outputDiv);
                } else outputDiv.innerHTML += `<div>密码错误</div>`;
            }
            else if(cmdTrim === 'wb-rot') { terminalContext.hasAdmin = true; outputDiv.innerHTML += `<div>✅ 已获取管理员权限</div>`; }
            else if(cmdTrim === 'wbos-rot-su/p') { terminalContext.hasRoot = terminalContext.hasAdmin = true; outputDiv.innerHTML += `<div>⚠️ 已获取底层权限 (root)</div>`; }
            else if(cmdTrim === 'wbos-clean-su/p') { terminalContext.hasRoot = terminalContext.hasAdmin = false; outputDiv.innerHTML += `<div>✅ 已清除权限</div>`; }
            else if(cmdTrim === '@kill-kill web.os.webos') { terminalContext.lockedUntil = null; outputDiv.innerHTML += `<div>✅ 账户已恢复</div>`; }
            else if(cmdTrim.startsWith('@kill-kill web.os/p time=')) {
                const match = cmdTrim.match(/time=(\d+)/);
                if(match) { terminalContext.lockedUntil = new Date(Date.now() + parseInt(match[1])*60000); outputDiv.innerHTML += `<div>🔒 已锁定 ${match[1]} 分钟</div>`; }
            }
            else if(cmdTrim === 'V/io') { outputDiv.innerHTML += `<div>👋 签出系统...</div>`; setTimeout(() => lockSystem(), 500); }
            else if(cmdTrim === 'reset-rm -rf') { outputDiv.innerHTML += `<div>🔄 重置系统...</div>`; setTimeout(() => location.reload(), 1000); }
            else if(cmdTrim === 'reset-pn/0') { saveConfig(); saveFS(); outputDiv.innerHTML += `<div>💾 系统已存档</div>`; }
            else if(terminalContext.hasRoot && cmdTrim === 'wbos-rot/rm -rf') {
                outputDiv.innerHTML += `<div>💀 删除系统文件...</div>`;
                setTimeout(() => { fileSystem = { 'root': { type: 'dir', parent: null, children: [] } }; saveFS(); location.reload(); }, 1000);
            }
            else { outputDiv.innerHTML += `<div>命令未找到: ${cmdTrim}</div>`; }
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
        
        const {div} = createWindow('💻 命令行 Terminal', 'terminal', `
            <div class="terminal">
                <div class="terminal-output" id="termOutput"></div>
                <div class="terminal-input-line">
                    <span class="terminal-prompt">${userConfig.name}@luoan:/$ </span>
                    <input type="text" class="terminal-input" id="termInput" autofocus>
                </div>
            </div>
        `, 750, 500, 120, 90);
        
        const outputDiv = div.querySelector('#termOutput');
        const inputElem = div.querySelector('#termInput');
        const promptSpan = div.querySelector('.terminal-prompt');
        
        function updatePrompt() { if(promptSpan) promptSpan.innerText = `${userConfig.name}@luoan:/${currentPath === 'root' ? '' : currentPath}$ `; }
        
        inputElem.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const cmd = inputElem.value;
                outputDiv.innerHTML += `<div>$ ${cmd}</div>`;
                executeCommand(cmd, outputDiv);
                inputElem.value = '';
                updatePrompt();
            }
        });
        outputDiv.innerHTML = `<div>Luoan OS G1.0 Terminal - 输入 help 查看命令</div><div>---</div>`;
    }
    
    function lockSystem() { isLoggedIn = false; showLoginDialog(); }
    
    function launchApp(appId) {
        const appMap = {
            'thispc': openThisPC, 'filemanager': openFileManager, 'recycle': openRecycleBin,
            'settings': openSettings, 'tomato': openTomato, 'browser': openBrowser,
            'terminal': openTerminal, 'monitor': openMonitor, 'calculator': openCalculator,
            'notes': openNotes, 'alarm': openAlarm, 'p2p': openP2P, 'paint': openPaint, 'music': openMusic
        };
        if(appMap[appId]) appMap[appId]();
    }
    
    // ----- UI初始化 -----
    function initUI() {
        // 桌面图标
        const desktopIcons = document.getElementById('desktopIcons');
        desktopIcons.innerHTML = '';
        allApps.forEach(app => {
            const icon = document.createElement('div');
            icon.className = 'desktop-icon';
            icon.setAttribute('data-app', app.id);
            icon.innerHTML = `<div class="icon">${app.icon}</div><div class="label">${app.name}</div>`;
            icon.onclick = () => launchApp(app.id);
            desktopIcons.appendChild(icon);
        });
        
        // 开始菜单固定应用
        const startPinsGrid = document.getElementById('startPinsGrid');
        startPinsGrid.innerHTML = '';
        allApps.forEach(app => {
            const pin = document.createElement('div');
            pin.className = 'start-pin';
            pin.setAttribute('data-app', app.id);
            pin.innerHTML = `<div class="pin-icon">${app.icon}</div><div class="pin-name">${app.name}</div>`;
            pin.onclick = () => { launchApp(app.id); startMenu.classList.remove('show'); };
            startPinsGrid.appendChild(pin);
        });
        
        const startMenu = document.getElementById('startMenu');
        const startBtn = document.getElementById('startBtn');
        let startVisible = false;
        startBtn.onclick = (e) => { e.stopPropagation(); startVisible = !startVisible; startMenu.classList.toggle('show', startVisible); };
        window.onclick = (e) => { if(startVisible && !startMenu.contains(e.target) && e.target !== startBtn) { startMenu.classList.remove('show'); startVisible = false; } };
        
        document.querySelectorAll('.taskbar-app[data-app]').forEach(el => {
            if(el.getAttribute('data-app') !== 'start') {
                el.onclick = () => launchApp(el.getAttribute('data-app'));
            }
        });
        
        document.getElementById('lockBtn').onclick = () => { lockSystem(); startMenu.classList.remove('show'); };
        document.getElementById('shutdownBtn').onclick = () => { windows.forEach(w => closeWindow(w.id)); showNotify('系统已关闭'); };
        document.getElementById('restartBtn').onclick = () => { location.reload(); };
        document.getElementById('sleepBtn').onclick = () => { document.body.style.opacity = '0.5'; setTimeout(() => { document.body.style.opacity = '1'; }, 1000); };
        
        // 快捷键
        window.addEventListener('keydown', (e) => {
            if(e.altKey && e.key === 'Alt') { e.preventDefault(); startBtn.click(); }
            else if(e.altKey && e.key === 't') { e.preventDefault(); openTerminal(); }
            else if(e.altKey && e.key === 'n') { e.preventDefault(); lockSystem(); }
        });
        
        // 右键菜单
        document.getElementById('desktopArea').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const menu = document.createElement('div'); menu.className = 'context-menu';
            menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
            menu.innerHTML = `<div class="context-menu-item" data-action="refresh">🔄 刷新</div><div class="context-menu-item" data-action="newfolder">📁 新建文件夹</div><div class="context-menu-item" data-action="recycle">🗑️ 回收站</div><div class="context-menu-item" data-action="settings">⚙️ 设置</div>`;
            document.body.appendChild(menu);
            const remove = () => menu.remove();
            menu.querySelectorAll('.context-menu-item').forEach(item => {
                item.onclick = () => {
                    const action = item.getAttribute('data-action');
                    if(action === 'refresh') location.reload();
                    if(action === 'newfolder') { let name = prompt('文件夹名'); if(name) addItem('root', name, true); }
                    if(action === 'recycle') openRecycleBin();
                    if(action === 'settings') openSettings();
                    remove();
                };
            });
            setTimeout(() => menu.remove(), 3000);
            window.addEventListener('click', () => menu.remove(), { once: true });
        });
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clockDisplay').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString('zh-CN');
        }
        setInterval(updateClock, 1000);
        updateClock();
    }
    
    async function showMountDialog() {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'mount-overlay';
            overlay.innerHTML = `<div class="mount-card"><div style="font-size:48px">💾</div><h3>选择 U盘 目录</h3><p>所有数据将保存在此目录</p><button id="selectUsb">选择文件夹</button></div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('#selectUsb').onclick = async () => {
                try {
                    usbRoot = await window.showDirectoryPicker();
                    await ensureWebOS();
                    const saved = await loadConfig();
                    if(saved) userConfig = saved;
                    else await saveConfig();
                    await loadFS();
                    if(!fileSystem || Object.keys(fileSystem).length === 0) {
                        fileSystem = { 'root': { type: 'dir', parent: null, children: ['Documents','Pictures','Downloads','Music','Videos','回收站'] },
                            'Documents':{type:'dir',parent:'root',children:[]}, 'Pictures':{type:'dir',parent:'root',children:[]},
                            'Downloads':{type:'dir',parent:'root',children:[]}, 'Music':{type:'dir',parent:'root',children:[]},
                            'Videos':{type:'dir',parent:'root',children:[]}, '回收站':{type:'dir',parent:'root',children:[]} };
                        await saveFS();
                    }
                    try { const wall = await webosDir.getFileHandle('wallpaper.jpg'); const file = await wall.getFile(); document.getElementById('wallpaperLayer').style.backgroundImage = `url(${URL.createObjectURL(file)})`; } catch(e){ document.getElementById('wallpaperLayer').style.backgroundImage = 'linear-gradient(135deg, #1a2a3a, #0a1520)'; }
                    overlay.remove();
                    resolve(true);
                } catch(e) { showNotify('请选择有效文件夹'); }
            };
        });
    }
    
    async function showLoginDialog() {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'login-overlay';
            overlay.innerHTML = `<div class="login-card"><div style="font-size:48px">👤</div><h3>${escapeHtml(userConfig.name)}</h3><input type="password" id="loginPass" placeholder="密码" autofocus><button id="doLogin">登录</button><p style="margin-top:16px;font-size:12px;opacity:0.6">${userConfig.password ? '需要密码' : '直接登录'}</p></div>`;
            document.body.appendChild(overlay);
            const inp = overlay.querySelector('#loginPass');
            const btn = overlay.querySelector('#doLogin');
            const check = () => {
                if(!userConfig.password || inp.value === userConfig.password) {
                    overlay.remove();
                    isLoggedIn = true;
                    document.getElementById('startUsername').innerText = userConfig.name;
                    resolve(true);
                } else { showNotify('密码错误'); inp.value = ''; }
            };
            btn.onclick = check;
            inp.onkeypress = e => { if(e.key === 'Enter') check(); };
        });
    }
    
    async function start() {
        await showMountDialog();
        await showLoginDialog();
        initUI();
        applyTheme(userConfig.theme);
        showNotify(`欢迎 ${userConfig.name} | Luoan OS G1.0 完整版已启动 | 共 ${allApps.length} 个应用`, 4000);
    }
    
    start();
})();
